syntax = "proto3";

package siit.v1alpha1;

option go_package = "github.com/hown3d/siit-ebpf/pkg/apis/siit/v1alpha1";

service EAMTService {
  rpc List(ListRequest) returns (ListResponse) {}
  rpc Create(CreateRequest) returns (CreateResponse) {}
  rpc Delete(DeleteRequest) returns (DeleteResponse) {}
}

message ListRequest {
  IPPrefix pool = 1;
}

message ListResponse {
  repeated EAMTEntry entries = 1;
}

message CreateRequest {
  IPPrefix pool = 1;
  EAMTEntry entry = 2;
}

message CreateResponse {}

message DeleteRequest {
  IPPrefix pool = 1;
  EAMTEntry entry = 2;
}

message DeleteResponse {}

message EAMTEntry {
  IPAddress ipv4 = 1;
  IPAddress ipv6 = 2;
}

message IPAddress {
  oneof ip {
    string ipv4 = 1;
    string ipv6 = 2;
  }
}

message IPPrefix {
  IPAddress ip = 1;
  uint32 prefix_len = 3;
}
