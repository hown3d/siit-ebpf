syntax = "proto3";

package siit.v1alpha1;

import "buf/validate/validate.proto";

option go_package = "github.com/hown3d/siit-ebpf/pkg/apis/siit/v1alpha1";

service EAMTService {
  rpc List(ListRequest) returns (ListResponse) {}
  rpc Create(CreateRequest) returns (CreateResponse) {}
  rpc Delete(DeleteRequest) returns (DeleteResponse) {}
}

message ListRequest {
  IPv6Prefix pool = 1;
}

message ListResponse {
  repeated EAMTEntry entries = 1;
}

message CreateRequest {
  IPv6Prefix pool = 1;
  EAMTEntry entry = 2;
}

message CreateResponse {}

message DeleteRequest {
  IPv6Prefix pool = 1;
  EAMTEntry entry = 2;
}

message DeleteResponse {}

message EAMTEntry {
  IPAddress ipv4 = 1;
  IPAddress ipv6 = 2;
}

message IPAddress {
  oneof ip {
    string ipv4 = 1 [(buf.validate.field).string.ipv4 = true];
    string ipv6 = 2 [(buf.validate.field).string.ipv6 = true];
  }
}

message IPv6Prefix {
  string prefix = 1 [(buf.validate.field).string.ipv6_prefix = true];
}
